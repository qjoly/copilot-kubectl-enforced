name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # create GitHub releases and upload assets
  packages: write    # push to ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # 1. Docker image — build and push to ghcr.io
  # ---------------------------------------------------------------------------
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # tag with the full semver, e.g. v1.2.3
            type=semver,pattern={{version}}
            # tag with major.minor, e.g. v1.2
            type=semver,pattern={{major}}.{{minor}}
            # always update :latest on a release tag
            type=raw,value=latest,enable=true

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 2. Go binaries — cross-compile and publish GitHub Release via GoReleaser
  # ---------------------------------------------------------------------------
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: docker           # attach release notes only after image is pushed
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0    # GoReleaser needs the full git history for changelog

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
